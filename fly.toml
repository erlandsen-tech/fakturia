# fly.toml app configuration file generated for Fakturia
#
# Run "fly launch" to create a new app or "fly deploy" to deploy an existing one

app = "fakturia"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "npx prisma migrate deploy || true"

[env]
  PORT = "3003"
  NODE_ENV = "production"

[http_service]
  internal_port = 3003
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.alive]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/api/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1